<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P 火柴人 - 完美對戰版</title>
    <style>
        body { margin: 0; background-color: #0b0c10; color: white; font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; user-select: none; }
        
        #lobby { background: rgba(11, 12, 16, 0.9); padding: 40px; border-radius: 10px; border: 2px solid #66fcf1; text-align: center; box-shadow: 0 0 30px rgba(102, 252, 241, 0.4); z-index: 100; }
        .id-box { background: #1f2833; padding: 15px; border-radius: 5px; font-family: monospace; font-size: 20px; color: #f1c40f; margin: 15px 0; user-select: all; }
        input { padding: 12px; font-size: 16px; width: 80%; margin-bottom: 15px; text-align: center; border-radius: 5px; border: none; outline: none; }
        button { padding: 12px 25px; font-size: 18px; background: #45a29e; color: white; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; transition: 0.2s; }
        button:hover { background: #66fcf1; color: #0b0c10; }

        #game-container { display: none; flex-direction: column; align-items: center; position: relative; }
        #ui { width: 1200px; display: flex; justify-content: space-between; margin-bottom: 10px; }
        .player-panel { width: 30%; }
        .health-bar-bg { width: 100%; height: 24px; background: #1f2833; border: 2px solid #45a29e; border-radius: 4px; overflow: hidden; position: relative; }
        .hp-fill { width: 100%; height: 100%; transition: width 0.1s, background-color 0.3s; }
        #local-hp-bar { background: #66fcf1; } 
        #remote-hp-bar { background: #ff0055; float: right; }
        .weapon-text { margin-top: 5px; font-weight: bold; color: #f1c40f; font-size: 15px; text-shadow: 1px 1px 2px black; }

        canvas { background: #12121c; border: 3px solid #45a29e; box-shadow: 0 0 40px rgba(69, 162, 158, 0.3); border-radius: 8px; cursor: crosshair; }
        #info { margin-top: 10px; color: #c5c6c7; font-size: 15px; text-align: center; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 5px; }
        
        #respawn-msg { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 48px; font-weight: bold; color: #ff0055; text-shadow: 0 0 20px #ff0055; display: none; z-index: 10; pointer-events: none;}
    </style>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body oncontextmenu="return false;">

    <div id="lobby">
        <h2 style="margin-top:0; color: #66fcf1;">🌐 終極火柴人競技場</h2>
        <p>告訴朋友你的專屬 ID (P1 房主)：</p>
        <div class="id-box" id="my-id">正在生成 ID...</div>
        <hr style="border-color: #45a29e; margin: 20px 0;">
        <p>或者輸入朋友的 ID 來加入 (P2 訪客)：</p>
        <input type="text" id="target-id" placeholder="貼上朋友的 ID">
        <br>
        <button onclick="connectToPeer()">🔗 連線加入</button>
        <div id="status" style="margin-top: 15px; color: #ff0055; font-weight: bold;"></div>
    </div>

    <div id="game-container">
        <div id="ui">
            <div class="player-panel">
                <div style="color: #66fcf1; font-weight: bold; margin-bottom: 4px;">你 (WASD | Shift衝刺)</div>
                <div class="health-bar-bg"><div id="local-hp-bar" class="hp-fill"></div></div>
                <div id="local-weapon" class="weapon-text">武器: 🥊 空手</div>
            </div>
            <div id="respawn-msg">YOU DIED</div>
            <div class="player-panel" style="text-align: right;">
                <div style="color: #ff0055; font-weight: bold; margin-bottom: 4px;">對手 (Remote)</div>
                <div class="health-bar-bg"><div id="remote-hp-bar" class="hp-fill"></div></div>
                <div id="remote-weapon" class="weapon-text">武器: 🥊 空手</div>
            </div>
        </div>
        <canvas id="gameCanvas" width="1200" height="700"></canvas>
        <div id="info">💡 [左鍵] 攻擊 | [右鍵] 防禦 | [F鍵] 撿武器 | [W鍵] 二段跳 | ⚠️血越少被擊飛越遠！</div>
    </div>

    <script>
        const peer = new Peer();
        let conn = null;
        let isHost = true; 

        peer.on('open', (id) => { document.getElementById('my-id').innerText = id; });
        peer.on('connection', (connection) => { conn = connection; isHost = true; setupConnection(); });

        function connectToPeer() {
            const targetId = document.getElementById('target-id').value.trim();
            if (!targetId) return;
            document.getElementById('status').innerText = "連線中...";
            conn = peer.connect(targetId);
            conn.on('open', () => { isHost = false; setupConnection(); });
        }

        function setupConnection() {
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
            
            localPlayer.x = isHost ? 300 : 900;
            localPlayer.color = isHost ? '#66fcf1' : '#ff0055';
            remotePlayer.x = isHost ? 900 : 300;
            remotePlayer.color = isHost ? '#ff0055' : '#66fcf1';

            conn.on('data', (data) => {
                if (data.type === 'state') {
                    // 【關鍵修復】接收對手座標的同時，也接收他的「血量」！
                    remotePlayer.x = data.x; remotePlayer.y = data.y;
                    remotePlayer.aimAngle = data.aimAngle;
                    remotePlayer.isDefending = data.isDefending;
                    remotePlayer.isAttacking = data.isAttacking;
                    remotePlayer.weapon = data.weapon;
                    remotePlayer.facingRight = data.facingRight;
                    remotePlayer.hp = data.hp; 
                    
                    document.getElementById('remote-weapon').innerText = `武器: ${getWeaponName(data.weapon)}`;
                    
                    // 同步對手血條
                    let rhpBar = document.getElementById('remote-hp-bar');
                    rhpBar.style.width = Math.max(0, remotePlayer.hp) + '%';
                    if (remotePlayer.hp < 30) rhpBar.style.background = '#e74c3c';
                    else if (remotePlayer.hp < 60) rhpBar.style.background = '#f1c40f';
                    else rhpBar.style.background = remotePlayer.color;

                } else if (data.type === 'hit') {
                    if (!localPlayer.isDefending && !localPlayer.isDead) {
                        localPlayer.hp -= data.damage;
                        
                        // 【大亂鬥機制】血量越少，擊飛越遠 (100滿血時倍率為1，0血時倍率為3)
                        let knockMultiplier = 1 + Math.max(0, (100 - localPlayer.hp) / 50);
                        localPlayer.vx = data.knockX * knockMultiplier; 
                        localPlayer.vy = data.knockY * knockMultiplier;
                        
                        createParticles(localPlayer.x, localPlayer.y, localPlayer.color, 20, 8);
                        spawnDamageText(localPlayer.x, localPlayer.y - 20, `-${data.damage}`);
                        
                        screenShake = 15; hitStopFrames = 5; 
                    }
                } else if (data.type === 'projectile') {
                    projectiles.push(data.p);
                } else if (data.type === 'spawnCrate') {
                    weaponCrates.push(data.crate);
                } else if (data.type === 'removeCrate') {
                    weaponCrates = weaponCrates.filter(c => c.id !== data.id);
                } else if (data.type === 'dash') {
                    createParticles(remotePlayer.x, remotePlayer.y, remotePlayer.color, 15, 4);
                }
            });

            conn.on('close', () => { alert("對方已斷線！"); location.reload(); });
            gameLoop();
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const GRAVITY = 0.7; 
        const FRICTION = 0.85; 

        let screenShake = 0;
        let hitStopFrames = 0;

        const keys = {};
        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        let mouseX = 0, mouseY = 0, isMouseDownLeft = false, isMouseDownRight = false;
        canvas.addEventListener('mousemove', e => { const r = canvas.getBoundingClientRect(); mouseX = e.clientX - r.left; mouseY = e.clientY - r.top; });
        canvas.addEventListener('mousedown', e => { if(e.button === 0) isMouseDownLeft = true; if(e.button === 2) isMouseDownRight = true; });
        canvas.addEventListener('mouseup', e => { if(e.button === 0) isMouseDownLeft = false; if(e.button === 2) isMouseDownRight = false; });

        const platforms = [
            { x: 100, y: 650, w: 1000, h: 50, isMain: true }, 
            { x: 250, y: 500, w: 150, h: 15, isMain: false }, { x: 800, y: 500, w: 150, h: 15, isMain: false },
            { x: 450, y: 380, w: 300, h: 20, isMain: false }, 
            { x: 150, y: 280, w: 100, h: 15, isMain: false }, { x: 950, y: 280, w: 100, h: 15, isMain: false }
        ];

        let projectiles = [];
        let particles = [];
        let weaponCrates = [];
        let floatingTexts = []; // 傷害跳字陣列

        function getWeaponName(w) {
            if (w === 'gun') return '🔫 手槍 (Pistol)';
            if (w === 'sword') return '🗡️ 光劍 (Sword)';
            return '🥊 空手 (Unarmed)';
        }

        function spawnDamageText(x, y, text) {
            floatingTexts.push({ x: x, y: y, text: text, life: 1.0, vy: -1.5 });
        }

        class Player {
            constructor(isLocal) {
                this.isLocal = isLocal;
                this.x = 0; this.y = 400; this.vx = 0; this.vy = 0;
                this.width = 16; this.height = 36;
                this.color = '#fff'; this.hp = 100;
                this.speed = 1.0; this.jumpPower = -16;
                this.jumpsCount = 0; this.maxJumps = 2; 
                this.upPressedBefore = false;
                
                this.isGrounded = false;
                this.aimAngle = 0; this.facingRight = true;
                this.weapon = null;
                this.isDefending = false;
                
                this.attackCooldown = 0; this.dashCooldown = 0;
                this.isAttacking = false; this.attackTimer = 0;
                this.animTimer = 0;
                this.isDead = false;
            }

            respawn() {
                this.isDead = false;
                this.hp = 100;
                this.x = isHost ? 300 : 900; // 回到出生點
                this.y = 100;
                this.vx = 0; this.vy = 0;
                this.weapon = null;
                document.getElementById('respawn-msg').style.display = 'none';
                document.getElementById('local-weapon').innerText = `武器: 🥊 空手`;
            }

            updateLocal() {
                // 死亡判定與重生倒數
                if (!this.isDead && (this.hp <= 0 || this.y > canvas.height + 100 || this.x < -100 || this.x > canvas.width + 100)) {
                    this.isDead = true;
                    document.getElementById('respawn-msg').style.display = 'block';
                    createParticles(this.x, this.y, this.color, 30, 10);
                    setTimeout(() => this.respawn(), 3000); // 3秒後重生
                    return; // 死掉時不處理控制
                }
                if (this.isDead) return;

                if (this.attackCooldown > 0) this.attackCooldown--;
                if (this.dashCooldown > 0) this.dashCooldown--;
                
                if (this.attackTimer > 0) { this.attackTimer--; this.isAttacking = true; } 
                else this.isAttacking = false;

                this.isDefending = isMouseDownRight;
                let curSpeed = this.isDefending ? this.speed * 0.3 : this.speed;

                if (keys['a']) this.vx -= curSpeed;
                if (keys['d']) this.vx += curSpeed;
                
                if (keys['w'] && !this.isDefending) {
                    if (!this.upPressedBefore && this.jumpsCount < this.maxJumps) {
                        this.vy = this.jumpPower; this.isGrounded = false; this.jumpsCount++;
                        createParticles(this.x, this.y + this.height/2, '#fff', 5, 3);
                    }
                    this.upPressedBefore = true;
                } else {
                    this.upPressedBefore = false;
                    if (this.vy < -5) this.vy = -5;
                }

                if (keys['shift'] && this.dashCooldown <= 0 && !this.isDefending) {
                    this.dashCooldown = 60; 
                    this.vx = Math.cos(this.aimAngle) * 25; this.vy = Math.sin(this.aimAngle) * 25;
                    createParticles(this.x, this.y, this.color, 15, 5);
                    if (conn) conn.send({ type: 'dash' });
                }

                let shoulderY = this.y - this.height/4;
                let dx = mouseX - this.x; let dy = mouseY - shoulderY;
                this.aimAngle = Math.atan2(dy, dx);
                this.facingRight = dx > 0;

                // 攻擊
                if (isMouseDownLeft && this.attackCooldown <= 0 && !this.isDefending) {
                    this.attackTimer = 12; 

                    if (this.weapon === 'gun') {
                        this.attackCooldown = 20;
                        let tipX = this.x + Math.cos(this.aimAngle) * 25;
                        let tipY = shoulderY + Math.sin(this.aimAngle) * 25;
                        
                        let p = { x: tipX, y: tipY, vx: Math.cos(this.aimAngle) * 22, vy: Math.sin(this.aimAngle) * 22, color: '#f1c40f', isLocal: true, size: 5 };
                        projectiles.push(p);
                        conn.send({ type: 'projectile', p: p });
                        
                        this.vx -= Math.cos(this.aimAngle) * 5; 
                        createParticles(tipX, tipY, '#f1c40f', 8, 3);
                    } else {
                        this.attackCooldown = this.weapon === 'sword' ? 30 : 20;
                        let reach = this.weapon === 'sword' ? 65 : 35;
                        let dmg = this.weapon === 'sword' ? 18 : 8;
                        let baseKnockForce = this.weapon === 'sword' ? 15 : 8; // 基礎擊退力道

                        let dist = Math.hypot(remotePlayer.x - this.x, remotePlayer.y - this.y);
                        let nx = (remotePlayer.x - this.x) / (dist || 1);
                        let ny = (remotePlayer.y - this.y) / (dist || 1);
                        let dot = nx * Math.cos(this.aimAngle) + ny * Math.sin(this.aimAngle);

                        if (dist < reach && dot > 0.3 && !remotePlayer.isDefending && !remotePlayer.isDead) {
                            // 傳送傷害與基礎擊退方向
                            conn.send({ 
                                type: 'hit', damage: dmg, 
                                knockX: Math.cos(this.aimAngle) * baseKnockForce, 
                                knockY: Math.sin(this.aimAngle) * baseKnockForce - 4 
                            });
                            
                            screenShake = 12; hitStopFrames = 5; 
                            createParticles(remotePlayer.x, remotePlayer.y, '#fff', 15, 8);
                        } else if (dist < reach && dot > 0.3 && remotePlayer.isDefending) {
                            createParticles(remotePlayer.x, remotePlayer.y, '#fff', 5, 3);
                        }
                    }
                }

                if (keys['f']) {
                    for (let i = 0; i < weaponCrates.length; i++) {
                        let c = weaponCrates[i];
                        if (Math.abs(this.x - c.x) < 35 && Math.abs(this.y - c.y) < 35) {
                            this.weapon = c.type;
                            document.getElementById('local-weapon').innerText = `武器: ${getWeaponName(this.weapon)}`;
                            conn.send({ type: 'removeCrate', id: c.id });
                            weaponCrates.splice(i, 1);
                            keys['f'] = false; break;
                        }
                    }
                }

                let pdx = this.x - remotePlayer.x; let pdy = this.y - remotePlayer.y;
                let pDist = Math.hypot(pdx, pdy);
                if (pDist > 0 && pDist < 20 && !remotePlayer.isDead) {
                    let push = (20 - pDist) / 2;
                    this.x += (pdx / pDist) * push; this.y += (pdy / pDist) * push;
                }

                this.vy += GRAVITY; this.vx *= FRICTION;
                this.x += this.vx; this.y += this.vy;

                this.isGrounded = false;
                let isPressingDown = keys['s']; 
                if (this.vy >= 0) {
                    for (let p of platforms) {
                        if (this.x + this.width/2 > p.x && this.x - this.width/2 < p.x + p.w) {
                            if (isPressingDown && !p.isMain) continue; 
                            if (this.y + this.height/2 >= p.y && this.y + this.height/2 - this.vy <= p.y + 18) {
                                this.y = p.y - this.height/2; this.vy = 0; this.isGrounded = true; this.jumpsCount = 0;
                            }
                        }
                    }
                }

                if (Math.abs(this.vx) > 0.5 && this.isGrounded) this.animTimer += Math.abs(this.vx) * 0.25;
                else this.animTimer = 0;

                let hpBar = document.getElementById('local-hp-bar');
                hpBar.style.width = Math.max(0, this.hp) + '%';
                if (this.hp < 30) hpBar.style.background = '#e74c3c';
                else if (this.hp < 60) hpBar.style.background = '#f1c40f';
                else hpBar.style.background = '#66fcf1';
            }

            draw(ctx) {
                if (this.isDead) return; // 死掉不畫
                const cx = this.x; const cy = this.y;
                let shoulderY = cy - this.height/4;

                ctx.strokeStyle = this.color; ctx.lineWidth = 3.5; ctx.lineCap = 'round'; ctx.lineJoin = 'round';

                if (this.isDefending) {
                    ctx.fillStyle = this.color; ctx.globalAlpha = 0.2;
                    ctx.beginPath(); ctx.arc(cx, cy, 32, 0, Math.PI*2); ctx.fill();
                    ctx.globalAlpha = 1; ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.arc(cx, cy, 32, 0, Math.PI*2); ctx.stroke();
                    ctx.strokeStyle = this.color; ctx.lineWidth = 3.5;
                }

                ctx.beginPath(); ctx.arc(cx, cy - this.height/2, 8, 0, Math.PI * 2); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(cx, cy - this.height/2 + 8); ctx.lineTo(cx, cy + this.height/4);
                
                let legSwing = this.isLocal ? Math.sin(this.animTimer) * 12 : (this.vx !== 0 ? Math.sin(Date.now()*0.01)*12 : 0);
                if (!this.isGrounded) legSwing = 10;
                
                ctx.moveTo(cx, cy + this.height/4); ctx.lineTo(cx - legSwing/2, cy + this.height/2 - 4); ctx.lineTo(cx - legSwing, cy + this.height/2 + 12);
                ctx.moveTo(cx, cy + this.height/4); ctx.lineTo(cx + legSwing/2, cy + this.height/2 - 4); ctx.lineTo(cx + legSwing, cy + this.height/2 + 12);
                ctx.stroke();

                ctx.beginPath();
                let displayAngle = this.aimAngle;
                if (this.isAttacking && this.weapon !== 'gun') {
                    let arc = this.weapon === 'sword' ? 1.8 : 1.0;
                    displayAngle += this.facingRight ? arc : -arc;
                }

                let handX = cx + Math.cos(displayAngle) * 16; let handY = shoulderY + Math.sin(displayAngle) * 16;
                ctx.moveTo(cx, shoulderY); ctx.lineTo(handX, handY); ctx.stroke();

                if (this.weapon === 'gun') {
                    ctx.strokeStyle = '#c5c6c7'; ctx.lineWidth = 5; ctx.beginPath();
                    ctx.moveTo(handX, handY); ctx.lineTo(handX + Math.cos(displayAngle)*12, handY + Math.sin(displayAngle)*12);
                    ctx.lineTo(handX + Math.cos(displayAngle)*12, handY + Math.sin(displayAngle)*12 + 4); ctx.stroke();
                } else if (this.weapon === 'sword') {
                    ctx.strokeStyle = '#f1c40f'; ctx.lineWidth = 4; ctx.shadowBlur = 15; ctx.shadowColor = '#f1c40f';
                    ctx.beginPath(); ctx.moveTo(handX, handY); ctx.lineTo(handX + Math.cos(displayAngle)*30, handY + Math.sin(displayAngle)*30); ctx.stroke();
                    ctx.shadowBlur = 0;
                }
            }
        }

        const localPlayer = new Player(true);
        const remotePlayer = new Player(false);

        function createParticles(x, y, color, count, speed) {
            for (let i = 0; i < count; i++) particles.push({ x: x, y: y, vx: (Math.random()-0.5)*speed, vy: (Math.random()-0.5)*speed, life: 1, color: color, size: Math.random()*3+2 });
        }

        function gameLoop() {
            requestAnimationFrame(gameLoop);

            if (hitStopFrames > 0) { hitStopFrames--; return; }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            if (screenShake > 0) {
                ctx.translate((Math.random() - 0.5) * screenShake, (Math.random() - 0.5) * screenShake);
                screenShake *= 0.8; if (screenShake < 0.5) screenShake = 0;
            }

            ctx.fillStyle = '#1f2833';
            for (let p of platforms) {
                ctx.fillRect(p.x, p.y, p.w, p.h);
                ctx.fillStyle = p.isMain ? '#45a29e' : '#66fcf1'; ctx.fillRect(p.x, p.y, p.w, 4); ctx.fillStyle = '#1f2833';
            }

            localPlayer.updateLocal();
            
            if (conn && conn.open) {
                conn.send({
                    type: 'state', x: localPlayer.x, y: localPlayer.y,
                    aimAngle: localPlayer.aimAngle, facingRight: localPlayer.facingRight,
                    isDefending: localPlayer.isDefending, isAttacking: localPlayer.isAttacking, 
                    weapon: localPlayer.weapon, hp: localPlayer.hp // 【發送血量】
                });
            }

            if (isHost && weaponCrates.length < 2 && Math.random() < 0.002) {
                let newCrate = { id: Math.random().toString(36).substr(2, 9), x: Math.random() * 800 + 200, y: -20, vy: 0, type: Math.random() > 0.5 ? 'gun' : 'sword' };
                weaponCrates.push(newCrate);
                if (conn) conn.send({ type: 'spawnCrate', crate: newCrate });
            }

            for (let i = weaponCrates.length - 1; i >= 0; i--) {
                let c = weaponCrates[i];
                c.vy += GRAVITY; c.y += c.vy;
                for (let p of platforms) { if (c.x + 20 > p.x && c.x < p.x + p.w && c.y + 20 >= p.y && c.y + 20 - c.vy <= p.y + 18) { c.y = p.y - 20; c.vy = 0; } }
                ctx.fillStyle = c.type === 'gun' ? '#c5c6c7' : '#f1c40f'; ctx.fillRect(c.x, c.y, 22, 22);
                ctx.fillStyle = '#111'; ctx.font = '14px Arial'; ctx.fillText(c.type === 'gun' ? '🔫' : '🗡️', c.x + 2, c.y + 16);
            }

            for (let i = projectiles.length - 1; i >= 0; i--) {
                let p = projectiles[i];
                p.x += p.vx; p.y += p.vy;
                ctx.fillStyle = p.color; ctx.shadowBlur = 10; ctx.shadowColor = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;

                if (p.x < 0 || p.x > canvas.width || p.y < 0 || p.y > canvas.height) { projectiles.splice(i, 1); continue; }

                if (!p.isLocal && !localPlayer.isDead && Math.hypot(p.x - localPlayer.x, p.y - localPlayer.y) < 22) {
                    if (!localPlayer.isDefending) {
                        localPlayer.hp -= 12;
                        
                        let knockMult = 1 + Math.max(0, (100 - localPlayer.hp) / 50);
                        localPlayer.vx = p.vx * 0.4 * knockMult; 
                        localPlayer.vy = -4 * knockMult;
                        
                        createParticles(localPlayer.x, localPlayer.y, localPlayer.color, 15, 6);
                        spawnDamageText(localPlayer.x, localPlayer.y - 20, "-12");
                        screenShake = 10;
                    } else { createParticles(p.x, p.y, '#fff', 8, 4); }
                    projectiles.splice(i, 1);
                }
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                let pt = particles[i];
                pt.vy += GRAVITY * 0.3; 
                pt.x += pt.vx; pt.y += pt.vy; pt.life -= 0.04;
                if (pt.life <= 0) particles.splice(i, 1);
                else {
                    ctx.fillStyle = pt.color; ctx.globalAlpha = pt.life;
                    ctx.beginPath(); ctx.arc(pt.x, pt.y, pt.size, 0, Math.PI*2); ctx.fill(); ctx.globalAlpha = 1;
                }
            }

            // 繪製傷害跳字
            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                let ft = floatingTexts[i];
                ft.y += ft.vy; ft.life -= 0.02;
                if (ft.life <= 0) floatingTexts.splice(i, 1);
                else {
                    ctx.fillStyle = `rgba(255, 50, 50, ${ft.life})`;
                    ctx.font = 'bold 20px Arial'; ctx.textAlign = 'center';
                    ctx.fillText(ft.text, ft.x, ft.y);
                }
            }

            remotePlayer.draw(ctx);
            localPlayer.draw(ctx);
            
            ctx.restore();
        }
    </script>
</body>
</html>
